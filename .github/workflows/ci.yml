name: SpendWise CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript Check
        run: npm run type-check

      - name: Run build
        env:
          # Dummy values for build — Next.js build does NOT start a server,
          # so Clerk does NOT validate the key at this stage.
          DATABASE_URL: "postgresql://user:pass@host:5432/db"
          CLERK_SECRET_KEY: "sk_test_dummy_secret_key_for_ci_build_only"
          GROQ_API_KEY: "dummy_groq_api_key_for_ci_build"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dGhvcm91Z2gtcGhlYXNhbnQtNTQuY2xlcmsuYWNjb3VudHMuZGV2JA"
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          # E2E tests start a real Next.js dev server — Clerk validates the
          # publishable key at startup, so we must use a real key from Secrets.
          # Add these in: GitHub repo → Settings → Secrets and variables → Actions
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: "postgresql://user:pass@host:5432/db"
          GROQ_API_KEY: "dummy_groq_api_key_for_ci_e2e"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
