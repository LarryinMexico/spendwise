name: SpendWise CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript Check
        run: npm run type-check

      - name: Run build test
        env:
          # Provide dummy variables to pass the build process
          # These values are not used for any real connection in CI
          DATABASE_URL: "postgresql://user:pass@host:5432/db"
          CLERK_SECRET_KEY: "dummy_secret_key_for_ci_build"
          GROQ_API_KEY: "dummy_groq_api_key_for_ci_build"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_ZHVtbXktY2xlcmstcHVibGlzaGFibGUta2V5"
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        env:
          DATABASE_URL: "postgresql://user:pass@host:5432/db"
          CLERK_SECRET_KEY: "dummy_secret_key_for_ci_build"
          GROQ_API_KEY: "dummy_groq_api_key_for_ci_build"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_ZHVtbXktY2xlcmstcHVibGlzaGFibGUta2V5"
        run: npm run test:e2e
